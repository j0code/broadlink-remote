name: Publish
on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Install Dependencies
        run: npm install
      - name: Clean up git environment
        run: git restore .
      - name: Publish package
        run: npx jsr publish
